# =============================================================================
# PR Auto-Fixer Workflow (Reusable)
# =============================================================================
# Purpose : Automatically fixes linting and formatting errors and commits the
#           changes back to the developer's PR branch.
# Trigger : Called by consumer repos via `workflow_call` or `workflow_dispatch`.
# =============================================================================

name: PR Auto-Fix

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"

jobs:
  autofix:
    name: Auto-fix Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      # ── 1. Checkout the branch ───────────────────────────────────────────
      # github.head_ref is only set on pull_request events.
      # For push events (e.g. push to main), fall back to github.ref_name.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Node.js with dependency caching ────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run ESLint with auto-fix ─────────────────────────────────────
      # Uses the standard `lint` script — passes --fix via the -- separator.
      - name: Fix lint errors
        run: npm run lint -- --fix
        continue-on-error: true

      # ── 5. Run Prettier to format code (optional) ───────────────────────
      # Only runs if prettier is listed in the project's package.json.
      - name: Fix formatting
        run: |
          if [ -f "node_modules/.bin/prettier" ]; then
            node_modules/.bin/prettier --write .
          else
            echo "Prettier not installed in this project — skipping."
          fi
        continue-on-error: true

      # ── 6. Commit & push fixed files back to the branch ───────────────
      # [skip ci] prevents this commit from re-triggering this same workflow
      # (avoids an infinite loop when autofix commits back to main).
      # The action is a no-op if there are no changes to commit.
      - name: Commit auto-fixed changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint and formatting issues [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
