# =============================================================================
# DEPRECATED — use deploy-preview.yml instead
# =============================================================================
# This file is kept for backwards compatibility only.
# It forwards all calls to deploy-preview.yml with production settings.
#
# New projects should use deploy-preview.yml directly (it handles both
# preview and production via inputs). See examples/caller-production-deploy.yml.
# =============================================================================

name: Deploy Production (deprecated wrapper)

on:
  workflow_call:
    inputs:
      db-schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override"
        required: false
        type: string
        default: ""
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  deploy-production:
    name: Deploy Production to Vercel
    uses: Wamocon/github_workflow/.github/workflows/deploy-preview.yml@main
    with:
      vercel_env: "production"
      vercel_args: "--prod"
      db_schema: ${{ inputs.db-schema }}
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
