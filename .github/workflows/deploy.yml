# =============================================================================
# Vercel Deployment — Unified Reusable Workflow
# =============================================================================
# Builds and deploys any project to Vercel using the CLI.
#
# KEY BYPASS MECHANISM:
#   rm -rf .git         → removes the Git metadata Vercel reads to detect the
#                         GitHub repo owner, preventing "team seat" errors on
#                         a personal Hobby account inside a GitHub org.
#   GITHUB_ACTIONS=""   → stops vercel CLI from entering its GitHub-Actions
#                         code path, which would re-attach deployment tracking
#                         to the repo and potentially trigger the same error.
#
# Secrets (all passed via `secrets: inherit` from the caller):
#   VERCEL_TOKEN      — personal access token (org-level secret)
#   VERCEL_ORG_ID     — your Vercel personal account ID (org-level secret or var)
#   VERCEL_PROJECT_ID — project-specific ID (repo-level secret in caller repo)
# =============================================================================

name: Vercel Deploy

on:
  workflow_call:
    inputs:
      vercel_env:
        description: "'preview' or 'production'"
        required: true
        type: string
      db_schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override. Leave empty to use Vercel env vars."
        required: false
        type: string
        default: ""
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_ORG_ID:
        required: false   # Falls back to vars.VERCEL_ORG_ID (org variable) if not set as a secret

jobs:
  deploy:
    name: Deploy to Vercel (${{ inputs.vercel_env }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "1"
      FORCE_COLOR: "0"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Cut Git linkage ─────────────────────────────────────────────────
      # Removes .git so Vercel CLI cannot detect the GitHub repo owner.
      # This prevents the "team seat required" error on a Hobby account.
      - name: Sever Git linkage
        run: rm -rf .git

      # ── 3. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      # ── 4. Validate required secrets ───────────────────────────────────────
      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=""
          [[ -z "$VERCEL_TOKEN" ]]      && missing="$missing  - VERCEL_TOKEN (org-level secret)"
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing="$missing  - VERCEL_PROJECT_ID (repo-level secret)"
          [[ -z "$VERCEL_ORG_ID" ]]     && missing="$missing  - VERCEL_ORG_ID (org-level secret or variable)"
          if [[ -n "$missing" ]]; then
            echo "::error::Missing required secrets or variables:"
            echo "$missing"
            exit 1
          fi
          echo "All Vercel credentials are present."

      # ── 5. Install Vercel CLI ──────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 6. Pull project config + env vars from Vercel ─────────────────────
      # GITHUB_ACTIONS and GITHUB_REPOSITORY are unset so the Vercel CLI does
      # not enter its GitHub integration code path during pull/build/deploy.
      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          export GITHUB_ACTIONS=""
          export GITHUB_REPOSITORY=""
          vercel pull --yes --environment=${{ inputs.vercel_env }} --token="$VERCEL_TOKEN"

      # ── 6a. Show linked project (debug) ────────────────────────────────────
      - name: Show linked project config
        run: |
          echo "Vercel CLI version: $(vercel --version)"
          echo "Resolved project link (.vercel/project.json):"
          cat .vercel/project.json || echo "(not found)"

      # ── 7. Optional DB schema override ────────────────────────────────────
      # Only applied when the caller explicitly passes a non-empty db_schema.
      - name: Apply DB schema override
        if: inputs.db_schema != ''
        run: |
          echo "NEXT_PUBLIC_DB_SCHEMA=${{ inputs.db_schema }}" >> "$GITHUB_ENV"
          echo "Schema override applied: ${{ inputs.db_schema }}" >> "$GITHUB_STEP_SUMMARY"

      # ── 8. Build ───────────────────────────────────────────────────────────
      - name: Build project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          export GITHUB_ACTIONS=""
          export GITHUB_REPOSITORY=""
          if [[ "${{ inputs.vercel_env }}" == "production" ]]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      # ── 9. Deploy prebuilt artifacts ───────────────────────────────────────
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          export GITHUB_ACTIONS=""
          export GITHUB_REPOSITORY=""
          set -euo pipefail

          PROD_FLAG=""
          [[ "${{ inputs.vercel_env }}" == "production" ]] && PROD_FLAG="--prod"

          rm -f vercel-deploy.log
          deploy_ok=false

          if vercel deploy --prebuilt $PROD_FLAG --yes --token="$VERCEL_TOKEN" > vercel-deploy.log 2>&1; then
            deploy_ok=true
          fi

          echo "=========================================="
          echo " VERCEL DEPLOY LOG"
          echo "=========================================="
          cat vercel-deploy.log || true
          echo "=========================================="

          INSPECT_URL=$(grep -Eo 'https://vercel\.com/[^[:space:]]+' vercel-deploy.log | grep -v '\.vercel\.app' | head -n 1 || true)

          if [[ "$deploy_ok" != "true" ]]; then
            {
              echo "### Deployment Failed"
              [[ -n "$INSPECT_URL" ]] && echo "**[Open Vercel Inspect URL]($INSPECT_URL)**"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          DEPLOY_URL=$(grep -Eo 'https://[^[:space:]]+\.vercel\.app' vercel-deploy.log \
            | sed 's/Building.*//' | grep -v '^$' | tail -n 1 || true)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "deploy_url=unknown" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
            {
              echo "### Deployed to Vercel"
              echo "**Environment:** ${{ inputs.vercel_env }}"
              echo "**URL:** $DEPLOY_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
