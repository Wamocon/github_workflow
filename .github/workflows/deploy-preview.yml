# =============================================================================
# Vercel Deployment Workflow (Reusable)
# =============================================================================
# Purpose : Unified Vercel CLI deployment workflow called by consumer repos.
#           Authenticates via a personal token, bypassing Vercel Hobby plan
#           team restrictions on private repositories.
#
#           The caller only needs to pass:
#             vercel_env → "preview" or "production"
#           Everything else is handled automatically.
#
# Secrets (pass via `secrets: inherit`):
#   Org-level  : VERCEL_TOKEN, VERCEL_ORG_ID
#   Repo-level : VERCEL_PROJECT_ID  (in the caller's repo, NOT this central repo)
# =============================================================================

name: Vercel Deploy

on:
  workflow_call:
    inputs:
      vercel_env:
        description: "Vercel environment ('preview' or 'production')"
        required: true
        type: string
      db_schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override (leave empty to use Vercel env vars)"
        required: false
        type: string
        default: ""
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_ORG_ID:
        required: true

jobs:
  deploy:
    name: Deploy to Vercel (${{ inputs.vercel_env }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Validate secrets ──────────────────────────────────────────────
      - name: Validate Vercel configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          missing=""
          [[ -z "$VERCEL_TOKEN" ]] && missing="$missing VERCEL_TOKEN(org secret)"
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing="$missing VERCEL_PROJECT_ID(repo secret)"
          [[ -z "$VERCEL_ORG_ID" ]] && missing="$missing VERCEL_ORG_ID(org secret)"
          if [[ -n "$missing" ]]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "All Vercel secrets present."

      # ── 4. Install Vercel CLI (pinned for stability) ─────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@canary

      # ── 5. Link project & pull env vars ──────────────────────────────────
      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      # ── 5.1 Optional schema override ─────────────────────────────────────
      - name: Apply DB schema override
        if: inputs.db_schema != ''
        run: |
          echo "NEXT_PUBLIC_DB_SCHEMA=${{ inputs.db_schema }}" >> "$GITHUB_ENV"
          echo "Schema override applied: ${{ inputs.db_schema }}" >> "$GITHUB_STEP_SUMMARY"

      # ── 6. Deploy (Vercel builds remotely — avoids prebuilt backend errors)
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          # Resolve --prod flag automatically
          PROD_FLAG=""
          if [[ "${{ inputs.vercel_env }}" == "production" ]]; then
            PROD_FLAG="--prod"
          fi

          rm -f vercel-deploy.log
          max_attempts=3
          attempt=1
          deploy_ok=false

          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "::group::Deploy attempt ${attempt}/${max_attempts}"

            if vercel deploy $PROD_FLAG --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee vercel-deploy.log; then
              deploy_ok=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"

            if [[ "$attempt" -lt "$max_attempts" ]]; then
              echo "::warning::Deploy attempt ${attempt} failed. Retrying in 15s..."
              sleep 15
            fi

            attempt=$((attempt + 1))
          done

          if [[ "$deploy_ok" != "true" ]]; then
            echo "### ❌ Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Vercel CLI failed after ${max_attempts} attempts." >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -20 vercel-deploy.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Extract deployment URL from CLI output
          # Clean any "Building..." text appended without newline
          sed -E 's/Building\.\.\..*$//' vercel-deploy.log > vercel-deploy-clean.log

          DEPLOY_URL=$(grep -Eo 'https://[^[:space:]]+\.vercel\.app' vercel-deploy-clean.log | tail -n 1 || true)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "::warning::Could not parse deployment URL from output"
            echo "deploy_url=unknown" >> "$GITHUB_OUTPUT"
            echo "### ⚠️ Deployed but URL not parsed" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the Vercel dashboard for the deployment URL." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
            echo "### ✅ Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
            echo "**Environment:** ${{ inputs.vercel_env }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**URL:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          fi
