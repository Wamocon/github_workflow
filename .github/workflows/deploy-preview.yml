# =============================================================================
# Vercel Preview Deployment Workflow (Reusable)
# =============================================================================
# Purpose : Deploys a preview build using the TEST database schema.
#           Includes both Next.js frontend and backend runtime code
#           (API routes, route handlers, and server actions) in one deployment.
#           Generates a unique preview URL for each Pull Request.
# Trigger : Called by consumer repos via `workflow_call` after PR checks pass.
# Secrets : Requires VERCEL_TOKEN and VERCEL_PROJECT_ID.
#           VERCEL_ORG_ID is expected at organisation level (secret or variable).
# =============================================================================

name: Deploy Preview

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      vercel-environment:
        description: "Vercel environment to pull"
        required: false
        type: string
        default: "preview"
      db-schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override (for custom schema names)"
        required: false
        type: string
        default: ""
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      # ── 3. Install Vercel CLI globally ──────────────────────────────────
      - name: Install Vercel CLI
        run: npm install -g vercel

      # ── 4. Pull Vercel preview environment ──────────────────────────────
      # This fetches environment variables including NEXT_PUBLIC_DB_SCHEMA=test
      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=${{ inputs.vercel-environment }} --token=$VERCEL_TOKEN

      # ── 4.1 Optional schema override for repo-specific naming ───────────
      - name: Apply optional DB schema override
        if: ${{ inputs.db-schema != '' }}
        run: |
          echo "NEXT_PUBLIC_DB_SCHEMA=${{ inputs.db-schema }}" >> $GITHUB_ENV
          echo "Using schema override: ${{ inputs.db-schema }}" >> $GITHUB_STEP_SUMMARY

      # ── 5. Build frontend + backend runtime ─────────────────────────────
      - name: Build frontend and backend (Next.js)
        run: vercel build --token=$VERCEL_TOKEN

      # ── 6. Deploy the pre-built output ──────────────────────────────────
      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "### 🔗 Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "URL: $PREVIEW_URL" >> $GITHUB_STEP_SUMMARY
