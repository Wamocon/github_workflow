# =============================================================================
# Vercel Deployment Workflow (Reusable)
# =============================================================================
# Purpose : Unified Vercel CLI deployment workflow called by consumer repos.
#           Authenticates via a personal token, bypassing Vercel Hobby plan
#           team restrictions on private repositories.
#
#           The caller decides the deployment target by passing:
#             vercel_env  → "preview" or "production"
#             db_schema   → optional NEXT_PUBLIC_DB_SCHEMA override.
#                           Leave empty to use the value already set in the
#                           Vercel environment (recommended for most projects).
#
# Secrets : VERCEL_TOKEN and VERCEL_ORG_ID at organisation level.
#           VERCEL_PROJECT_ID as a repo-level secret in the caller.
#           Pass all three via `secrets: inherit` in the caller workflow.
# =============================================================================

name: Vercel Deploy

on:
  workflow_call:
    inputs:
      vercel_env:
        description: "Vercel environment to pull ('preview' or 'production')"
        required: true
        type: string
      db_schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override. Leave empty to use the value from Vercel environment variables."
        required: false
        type: string
        default: ""
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_ORG_ID:
        required: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 20 ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 2.1 Validate required Vercel configuration ──────────────────────
      # Fail fast with a clear message if required secrets/variables are missing.
      - name: Validate Vercel configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "Missing VERCEL_TOKEN. Configure it at organisation secrets." >&2
            exit 1
          fi

          if [[ -z "$VERCEL_PROJECT_ID" ]]; then
            echo "Missing VERCEL_PROJECT_ID. Configure it at repository secrets." >&2
            exit 1
          fi

          if [[ -z "$VERCEL_ORG_ID" ]]; then
            echo "Missing VERCEL_ORG_ID. Configure it as org secret or org variable." >&2
            exit 1
          fi

      # ── 3. Install Vercel CLI globally ───────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 4. Pull Vercel environment variables ──────────────────────────────
      # Fetches env vars for the target environment from Vercel.
      # This includes NEXT_PUBLIC_DB_SCHEMA if configured in Vercel Dashboard.
      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Resolve deploy args
        id: resolve_args
        run: |
          if [[ "${{ inputs.vercel_env }}" == "production" ]]; then
            echo "vercel_args=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_args=" >> "$GITHUB_OUTPUT"
          fi

      # ── 4.1 Optional schema override ─────────────────────────────────────
      # Only runs if the caller explicitly passes a db_schema input.
      # Most projects should leave this empty and rely on Vercel env vars.
      - name: Apply DB schema override
        if: ${{ inputs.db_schema != '' }}
        run: |
          echo "NEXT_PUBLIC_DB_SCHEMA=${{ inputs.db_schema }}" >> $GITHUB_ENV
          echo "Schema override applied: ${{ inputs.db_schema }}" >> $GITHUB_STEP_SUMMARY

      # ── 5. Build project ──────────────────────────────────────────────────
      - name: Build project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build ${{ steps.resolve_args.outputs.vercel_args }} --token=${{ secrets.VERCEL_TOKEN }}

      # ── 6. Deploy to Vercel ───────────────────────────────────────────────
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          rm -f vercel-deploy.log
          max_attempts=3
          attempt=1
          deploy_ok=false

          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "Starting Vercel deploy attempt ${attempt}/${max_attempts}"

            if vercel deploy --prebuilt ${{ steps.resolve_args.outputs.vercel_args }} --no-wait --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee -a vercel-deploy.log; then
              deploy_ok=true
              break
            fi

            if [[ "$attempt" -lt "$max_attempts" ]]; then
              echo "Deploy attempt ${attempt} failed. Retrying in 10 seconds..."
              sleep 10
            fi

            attempt=$((attempt + 1))
          done

          if [[ "$deploy_ok" != "true" ]]; then
            echo "### Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Vercel CLI returned a non-zero exit code after ${max_attempts} attempts." >> "$GITHUB_STEP_SUMMARY"
            echo "Check the deploy logs in this job for the full error details." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          sed -E 's/Building\.\.\..*$//' vercel-deploy.log > vercel-deploy-clean.log

          DEPLOY_URL=$(grep -E '^(Production|Preview): https?://' vercel-deploy-clean.log | tail -n 1 | sed -E 's/^(Production|Preview):[[:space:]]*([^[:space:]]+).*$/\2/' || true)

          if [[ -z "$DEPLOY_URL" ]]; then
            DEPLOY_URL=$(grep -Eo 'https?://[^[:space:]]+' vercel-deploy-clean.log | grep -E 'vercel\.app' | tail -n 1 || true)
          fi

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "Could not extract deployment URL from Vercel CLI output." >&2
            echo "### Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Deployment finished but URL parsing failed. Check logs." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Waiting for deployment URL to become reachable..."
          health_ok=false
          for i in {1..30}; do
            status_code=$(curl -sS -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || true)

            if [[ "$status_code" =~ ^(2[0-9][0-9]|3[0-9][0-9]|401|403)$ ]]; then
              echo "Deployment reachable with HTTP $status_code"
              health_ok=true
              break
            fi

            if [[ "$status_code" == "404" || "$status_code" == "000" || "$status_code" =~ ^5 ]]; then
              echo "Attempt ${i}/30: HTTP $status_code, waiting 10s..."
              sleep 10
              continue
            fi

            echo "Attempt ${i}/30: HTTP $status_code (continuing to wait)"
            sleep 10
          done

          if [[ "$health_ok" != "true" ]]; then
            echo "### Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Deployment URL did not become reachable in time." >> "$GITHUB_STEP_SUMMARY"
            echo "URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
