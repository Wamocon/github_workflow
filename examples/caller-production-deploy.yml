# =============================================================================
# Deploy to Vercel — Manual Only
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/deploy.yml
#
# WHAT THIS DOES:
#   Manually deploy to Vercel from the GitHub Actions tab.
#   Choose "production" (live URL) or "preview" (test URL) at run time.
#   GitHub builds the project via Vercel CLI — Vercel never sees who pushed,
#   so this works even with a personal Hobby Vercel account inside a private
#   GitHub org (no team seat errors).
#
# SETUP — add ONE secret to your repo:
#   Settings → Secrets and variables → Actions → New repository secret:
#     VERCEL_PROJECT_ID → Vercel Dashboard → Project → Settings → Project ID
#
#   Everything else is already set once at the Wamocon organisation level:
#     VERCEL_TOKEN   — personal Vercel access token
#     VERCEL_ORG_ID  — your Vercel personal account ID
#
# HOW TO DEPLOY:
#   1. Go to your repo → Actions tab
#   2. Select "Deploy to Vercel" in the left sidebar
#   3. Click "Run workflow"
#   4. Pick "production" or "preview" from the dropdown
#   5. Click the green "Run workflow" button
# =============================================================================

name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  # ─── Step 1: Resolve which Vercel flags to use ────────────────────────────
  resolve:
    name: Resolve deployment vars
    runs-on: ubuntu-latest
    outputs:
      vercel_args: ${{ steps.res.outputs.vercel_args }}
    steps:
      - name: Set Vercel args
        id: res
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "vercel_args=--prod" >> $GITHUB_OUTPUT
          else
            echo "vercel_args=" >> $GITHUB_OUTPUT
          fi

  # ─── Step 2: Deploy via the shared Vercel CLI workflow ────────────────────
  # `secrets: inherit` passes VERCEL_TOKEN and VERCEL_ORG_ID (org-level) and
  # VERCEL_PROJECT_ID (repo-level) to the reusable workflow automatically.
  deploy:
    name: Deploy — ${{ inputs.environment }}
    needs: resolve
    uses: Wamocon/github_workflow/.github/workflows/deploy-preview.yml@main
    with:
      vercel_env: ${{ inputs.environment }}
      vercel_args: ${{ needs.resolve.outputs.vercel_args }}
    secrets: inherit
