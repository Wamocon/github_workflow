# =============================================================================
# STEP 2 of 2 — Vercel Deploy (Preview + Production)
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/deploy.yml
#
# ─────────────────────────────────────────────────────────────────────────────
# YOU NEED BOTH FILES:
#   caller-pr-pipeline.yml      → .github/workflows/pr-pipeline.yml
#   caller-production-deploy.yml → .github/workflows/deploy.yml   ← THIS FILE
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS FILE DOES (single file, two behaviours):
#   pull_request opened/updated → main or master
#       → Vercel PREVIEW deployment  (unique URL per PR, uses Preview env vars)
#   push / merge → main or master
#       → Vercel PRODUCTION deployment  (live URL, uses Production env vars)
#
# ─────────────────────────────────────────────────────────────────────────────
# SETUP — replace the placeholder below, then add one repo secret:
#
#   1. Replace YOUR_ORG and THIS_REPO in the `uses:` line of the deploy job:
#        YOUR_ORG  → GitHub org name            (e.g. Wamocon)
#        THIS_REPO → central workflow repo name  (e.g. github_workflow)
#
#   2. Add ONE secret to this repo (Settings → Secrets → Actions):
#        VERCEL_PROJECT_ID  →  from Vercel Project → Settings → General → Project ID
#
#   Everything else is already set at organisation level:
#        VERCEL_TOKEN    (personal Vercel access token — works on Hobby plan)
#        VERCEL_ORG_ID   (your Vercel personal account ID, not a team ID)
#
# ─────────────────────────────────────────────────────────────────────────────
# HOBBY VERCEL + INTERNAL ORG NOTE:
#   This workflow authenticates via the Vercel CLI using a personal token.
#   It does NOT use the Vercel GitHub App or team integration — so it works
#   with a personal Vercel Hobby account even if the GitHub repo is private
#   or internal within an organisation.
#
#   Any org member who opens a PR or merges to main/master will trigger this
#   workflow using the org-level VERCEL_TOKEN, so they do not need their own
#   Vercel access.
#
# ─────────────────────────────────────────────────────────────────────────────
# SCHEMA (optional):
#   Leave db_schema empty → schema value is pulled from Vercel env vars.
#   Only set db_schema if you need to override what Vercel has configured,
#   e.g. for repos using custom schema names like "qa" or "live".
# =============================================================================

name: Deploy — Preview & Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

# Cancel in-progress preview deploys when a new commit is pushed to the PR.
# Never cancel an in-flight production deploy.
concurrency:
  group: deploy-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Step 1: Resolve which environment and flags to use ─────────────────
  #
  #   pull_request  →  vercel_env=preview,     vercel_args=(empty)
  #   push          →  vercel_env=production,  vercel_args=--prod
  #
  set-vars:
    name: Resolve deployment variables
    runs-on: ubuntu-latest
    outputs:
      vercel_env: ${{ steps.resolve.outputs.vercel_env }}
      vercel_args: ${{ steps.resolve.outputs.vercel_args }}
    steps:
      - name: Resolve vercel_env and vercel_args
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "vercel_env=production" >> $GITHUB_OUTPUT
            echo "vercel_args=--prod" >> $GITHUB_OUTPUT
          else
            echo "vercel_env=preview" >> $GITHUB_OUTPUT
            echo "vercel_args=" >> $GITHUB_OUTPUT
          fi

  # ─── Step 2: Deploy via the shared Vercel CLI workflow ──────────────────
  #
  #   `secrets: inherit` passes VERCEL_TOKEN, VERCEL_ORG_ID (org level) and
  #   VERCEL_PROJECT_ID (repo level) down to the reusable workflow automatically.
  #
  deploy:
    name: ${{ github.event_name == 'push' && 'Deploy — Production' || 'Deploy — Preview' }}
    needs: set-vars
    # ⚠️  Replace YOUR_ORG and THIS_REPO with your actual values:
    uses: YOUR_ORG/THIS_REPO/.github/workflows/deploy-preview.yml@main
    with:
      vercel_env: ${{ needs.set-vars.outputs.vercel_env }}
      vercel_args: ${{ needs.set-vars.outputs.vercel_args }}
      # db_schema: ""      # leave empty — Vercel env vars control the schema
      # db_schema: "qa"    # uncomment and set only for non-standard schema names
    secrets: inherit
