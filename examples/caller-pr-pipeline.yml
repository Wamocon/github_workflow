# =============================================================================
# STEP 1 of 2 — PR Pipeline (Auto-Fix + Checks)
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/pr-pipeline.yml
#
# ─────────────────────────────────────────────────────────────────────────────
# YOU NEED BOTH FILES:
#   caller-pr-pipeline.yml       → .github/workflows/pr-pipeline.yml  ← THIS FILE
#   caller-production-deploy.yml → .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS FILE DOES:
#   Every time a PR is opened or updated against main/master:
#     1. Auto-Fix — runs ESLint --fix and Prettier, commits fixes back to the branch
#     2. PR Checks — runs TypeScript type-check and ESLint (blocks merge on failure)
#
#   This file does NOT deploy anything.
#   Vercel preview + production deployments are in caller-production-deploy.yml.
#
# ─────────────────────────────────────────────────────────────────────────────
# SETUP — replace the placeholders below:
#
#   Replace YOUR_ORG and THIS_REPO in both `uses:` lines:
#     YOUR_ORG  → GitHub org name            (e.g. Wamocon)
#     THIS_REPO → central workflow repo name  (e.g. github_workflow)
#
#   No secrets to add for this file — all checks run with the default
#   GITHUB_TOKEN that GitHub provides automatically.
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

# Cancel redundant runs on the same PR when a new commit is pushed
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Auto-fix lint & format errors ───────────────────────────────
  autofix:
    name: Auto-Fix
    # ⚠️  Replace YOUR_ORG/THIS_REPO:
    uses: YOUR_ORG/THIS_REPO/.github/workflows/pr-autofix.yml@main
    permissions:
      contents: write

  # ─── Step 2: Validate code (typecheck + lint) ────────────────────────────
  validate:
    name: PR Checks
    needs: autofix
    # ⚠️  Replace YOUR_ORG/THIS_REPO:
    uses: YOUR_ORG/THIS_REPO/.github/workflows/pr-checks.yml@main
