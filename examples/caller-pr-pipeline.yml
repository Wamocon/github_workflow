# =============================================================================
# Example: Caller Workflow — PR Pipeline (Auto-Fix + Checks)
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/pr-pipeline.yml
#
# Then replace:
#   YOUR_ORG  → your GitHub organisation name  (e.g. Wamocon)
#   THIS_REPO → this central repository name   (e.g. github_workflow)
#
# This workflow runs on every Pull Request targeting main/master.
# It auto-fixes lint/format issues then validates with typecheck + lint.
#
# Deployment (preview + production) is handled separately by deploy.yml.
# See examples/caller-deploy.yml.
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

# Cancel redundant runs on the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Auto-fix lint & format errors ───────────────────────────────
  autofix:
    name: Auto-Fix
    uses: YOUR_ORG/THIS_REPO/.github/workflows/pr-autofix.yml@main
    permissions:
      contents: write

  # ─── Step 2: Validate code (typecheck + lint) ───────────────────────────
  validate:
    name: PR Checks
    needs: autofix
    uses: YOUR_ORG/THIS_REPO/.github/workflows/pr-checks.yml@main
