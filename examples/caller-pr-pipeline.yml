# =============================================================================
# PR Pipeline — Auto-Fix + Checks
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/pr-pipeline.yml
#
# WHAT THIS DOES:
#   On every Pull Request targeting main/master (auto) OR when run manually:
#     1. Auto-Fix — runs ESLint --fix and Prettier (if installed),
#        commits fixes back to the PR branch.
#     2. PR Checks — runs TypeScript type-check and ESLint.
#        The PR is blocked from merging if checks fail.
#
# SETUP — no secrets needed.
#   GitHub provides GITHUB_TOKEN automatically.
#   Your package.json must have:
#     "lint"      — e.g.  "eslint ."
#     "typecheck" — e.g.  "tsc --noEmit"
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel redundant runs on the same PR when a new commit is pushed.
concurrency:
  group: pr-pipeline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Auto-fix lint & format errors ────────────────────────────────
  autofix:
    name: Auto-Fix
    uses: Wamocon/github_workflow/.github/workflows/pr-autofix.yml@main
    permissions:
      contents: write

  # ─── Step 2: Validate code (typecheck + lint) ─────────────────────────────
  validate:
    name: PR Checks
    needs: autofix
    uses: Wamocon/github_workflow/.github/workflows/pr-checks.yml@main
