# =============================================================================
# PR Pipeline — Auto-Fix + Checks
# =============================================================================
# COPY this file into your project as:
#   .github/workflows/pr-pipeline.yml
#
# WHAT THIS DOES:
#   Every time someone pushes to main/master (auto) OR you run it manually:
#     1. Auto-Fix — runs ESLint --fix and Prettier (if installed),
#        commits fixes back to the branch with [skip ci] to prevent loops.
#     2. PR Checks — runs TypeScript type-check and ESLint
#        (fails the run if there are errors after auto-fix).
#
# SETUP — no secrets needed, no placeholders to replace.
#   GitHub provides GITHUB_TOKEN automatically.
#   Your package.json must have:
#     "lint"      — e.g.  "eslint ."
#     "typecheck" — e.g.  "tsc --noEmit"
# =============================================================================

name: PR Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Cancel any in-progress run for the same branch when a new push arrives.
concurrency:
  group: pr-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Auto-fix lint & format errors ────────────────────────────────
  autofix:
    name: Auto-Fix
    uses: Wamocon/github_workflow/.github/workflows/pr-autofix.yml@main
    permissions:
      contents: write

  # ─── Step 2: Validate code (typecheck + lint) ─────────────────────────────
  validate:
    name: PR Checks
    needs: autofix
    uses: Wamocon/github_workflow/.github/workflows/pr-checks.yml@main
